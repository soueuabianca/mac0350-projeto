# Feito com IA Gemini
version: "3.8"

services:
  neo4j:
    image: neo4j:5
    container_name: neo4j_db
    ports:
      - "7474:7474" 
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-admin123}
    volumes:
      - neo4j_data:/data

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-admin123}
    depends_on:
      - neo4j

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080 
    depends_on:
      - backend

volumes:
  neo4j_data:
